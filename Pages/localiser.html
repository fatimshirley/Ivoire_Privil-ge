<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Localisation</title>

    <link rel="stylesheet" href="localiser.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="location-container">
      <h1>LOCALISATION DE LA RÉSIDENCE</h1>

      <p class="location-text">
        Retrouvez facilement la résidence grâce à la carte ci-dessous.
      </p>

      <div class="map-container">
        <iframe
          src="https://www.google.com/maps?q=Cocody+Palmeraie+Abidjan&output=embed"
          width="100%"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
        >
        </iframe>
      </div>

      <div class="location-info">
        <div class="info-box">
          <i class="fa-solid fa-location-dot"></i>
          <span>Cocody Palmeraie, Abidjan</span>
        </div>

        <div class="info-box">
          <i class="fa-solid fa-phone"></i>
          <span>0707 538 526</span>
        </div>

        <div class="info-box">
          <i class="fa-solid fa-clock"></i>
          <span>Disponible 24h/24</span>
        </div>
      </div>

      <a href="reserver.html" class="btn-location"> RÉSERVER MAINTENANT </a>
    </div>
  </body>
</html>
